name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker-it:
    name: Docker integration test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source and setup Java
        uses: dasch-swiss/shacl-cli/.github/actions/preparation@main
      - name: Build docker image locally
        run: ./sbtx "root/Docker/publishLocal"
      - name: Run docker integration test
        run: bash scripts/it/docker-it.sh

  publish-from-branch:
    name: Publish
    runs-on: ubuntu-latest
    needs: [docker-it]
    steps:
      - name: Build and publish docker image to Dockerhub
        uses: dasch-swiss/shacl-cli/.github/actions/docker@main
        with:
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}
          docker-user: ${{ secrets.DOCKER_USER }}
